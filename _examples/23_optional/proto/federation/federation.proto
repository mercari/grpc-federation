syntax = "proto3";

package org.federation;

import "grpc/federation/federation.proto";

option go_package = "example/federation;federation";

enum Color {
  COLOR_UNSPECIFIED = 0;
  COLOR_RED = 1;
  COLOR_GREEN = 2;
  COLOR_BLUE = 3;
}

message SubMessage {
  option (grpc.federation.message) = {};
  string value = 1 [(grpc.federation.field).by = "$.value"];
}

message BindSource {
  option (grpc.federation.message) = {};
  string opt_bind = 1 [(grpc.federation.field).by = "'auto-bound'"];
}

service FederationService {
  option (grpc.federation.service) = {};
  rpc GetPost(GetPostRequest) returns (GetPostResponse) {};
}

message GetPostRequest {
  optional string id = 1;
}

message GetPostResponse {
  option (.grpc.federation.message) = {
    def { name: "opt_int" by: "42" }
    def { name: "opt_color" by: "org.federation.Color.value('COLOR_RED')" }
    def {
      name: "opt_msg"
      message {
        name: "SubMessage"
        args { name: "value", by: "'hello'" }
      }
    }
    def { name: "bind_source" message { name: "BindSource" } autobind: true }
  };
  optional int64 opt_int = 1 [(grpc.federation.field).by = "opt_int"];
  optional Color opt_color = 2 [(grpc.federation.field).by = "opt_color"];
  optional SubMessage opt_msg = 3 [(grpc.federation.field).by = "opt_msg"];
  optional SubMessage opt_msg_2 = 4 [(grpc.federation.field).custom_resolver = true];
  optional string opt_id = 5 [(grpc.federation.field).by = "$.id"];
  optional bytes opt_bytes = 6 [(grpc.federation.field).by = "b'abc'"];
  optional string opt_bind = 7;
}
