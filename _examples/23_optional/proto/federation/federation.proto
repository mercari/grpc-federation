syntax = "proto3";

package org.federation;

import "grpc/federation/federation.proto";

option go_package = "example/federation;federation";

enum Color {
  COLOR_UNSPECIFIED = 0;
  COLOR_RED = 1;
  COLOR_GREEN = 2;
  COLOR_BLUE = 3;
}

message SubMessage {
  option (grpc.federation.message) = {};
  string value = 1 [(grpc.federation.field).by = "$.value"];
}

message BindSource {
  option (grpc.federation.message) = {};
  string opt_bind = 1 [(grpc.federation.field).by = "'auto-bound'"];
}

service FederationService {
  option (grpc.federation.service) = {};
  rpc GetPost(GetPostRequest) returns (GetPostResponse) {};
}

message GetPostRequest {
  optional string id = 1;
}

message GetPostResponse {
  option (.grpc.federation.message) = {
    def { name: "opt_int" by: "42" }
    def { name: "opt_color" by: "org.federation.Color.value('COLOR_RED')" }
    def {
      name: "opt_msg"
      message {
        name: "SubMessage"
        args { name: "value", by: "'hello'" }
      }
    }
    def { name: "bind_source" message { name: "BindSource" } autobind: true }
  };
  optional int64 opt_int = 1 [(grpc.federation.field).by = "opt_int"];
  optional Color opt_color = 2 [(grpc.federation.field).by = "opt_color"];
  optional SubMessage opt_msg = 3 [(grpc.federation.field).by = "opt_msg"];
  optional SubMessage opt_msg_2 = 4 [(grpc.federation.field).custom_resolver = true];
  optional string opt_id = 5 [(grpc.federation.field).by = "$.id"];
  optional bytes opt_bytes = 6 [(grpc.federation.field).by = "b'abc'"];
  optional string opt_bind = 7;
  // opt_none: optional.none() leaves the field unset (nil pointer).
  optional int64 opt_none = 8 [(grpc.federation.field).by = "false ? optional.of(opt_int) : optional.none()"];
  // opt_some: optional.of() sets the field to the given value.
  optional int64 opt_some = 9 [(grpc.federation.field).by = "true ? optional.of(opt_int) : optional.none()"];
  // opt_none_dynamic: runtime condition evaluates to false → nil.
  optional int64 opt_none_dynamic = 10 [(grpc.federation.field).by = "$.id == 'nonexistent' ? optional.of(opt_int) : optional.none()"];
  // opt_some_dynamic: runtime condition evaluates to true → field set.
  optional int64 opt_some_dynamic = 11 [(grpc.federation.field).by = "$.id != '' ? optional.of(opt_int) : optional.none()"];
  // opt_some_zero: optional.of(0) must set the field to *0, not leave it nil.
  optional int64 opt_some_zero = 12 [(grpc.federation.field).by = "optional.of(0)"];
  // opt_none_color: enum type with optional.none() leaves the field nil.
  optional Color opt_none_color = 13 [(grpc.federation.field).by = "false ? optional.of(opt_color) : optional.none()"];
}
